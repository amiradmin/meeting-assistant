services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: meeting_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meeting_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-meeting_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting_pass_2024}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meeting_user} -d ${POSTGRES_DB:-meeting_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meeting_network

  # Backend Django
  backend:
    build: ./backend
    container_name: meeting_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG:-1}
      - DJANGO_SETTINGS_MODULE=meeting_assistant.settings
      - POSTGRES_DB=${POSTGRES_DB:-meeting_assistant}
      - POSTGRES_USER=${POSTGRES_USER:-meeting_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-meeting_pass_2024}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - meeting_network

  # Frontend React
  frontend:
    build: ./frontend
    container_name: meeting_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000/api
      - NODE_ENV=development
    networks:
      - meeting_network
    stdin_open: true
    tty: true

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: meeting_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - backend
      - frontend
    networks:
      - meeting_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: meeting_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - meeting_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: meeting_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - meeting_network
    environment:
      - OLLAMA_HOST=0.0.0.0
    command: serve

  # Ollama setup
  ollama-setup:
    image: ollama/ollama:0.1.30
    container_name: meeting_ollama_setup
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - meeting_network
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama...';
        sleep 10;
        echo 'Pulling llama3.2:3b model...';
        ollama pull llama3.2:3b;
        echo 'Model downloaded!';
        exit 0;
      "

  # Celery Worker
  celery:
    build: ./backend
    container_name: meeting_celery
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    networks:
      - meeting_network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=meeting_assistant.settings
      - POSTGRES_DB=meeting_assistant
      - POSTGRES_USER=meeting_user
      - POSTGRES_PASSWORD=meeting_pass_2024
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: celery -A meeting_assistant worker --loglevel=info

  # Celery Beat
  celery-beat:
    build: ./backend
    container_name: meeting_celery_beat
    restart: unless-stopped
    volumes:
      - ./backend:/app
    networks:
      - meeting_network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=meeting_assistant.settings
      - POSTGRES_DB=meeting_assistant
      - POSTGRES_USER=meeting_user
      - POSTGRES_PASSWORD=meeting_pass_2024
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: celery -A meeting_assistant beat --loglevel=info

  # Flower
  flower:
    image: mher/flower:2.0
    container_name: meeting_flower
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    ports:
      - "5555:5555"
    networks:
      - meeting_network
    depends_on:
      - redis
      - celery

  # Transcriber
  transcriber:
    build: ./transcriber
    container_name: meeting_transcriber
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8001:8001"
    networks:
      - meeting_network
    environment:
      - MODEL_TYPE=persian-large
      - MODEL_SIZE=medium
      - HOST=0.0.0.0
      - PORT=8001
    # Comment out or remove healthcheck temporarily
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data:
  ollama_data:

networks:
  meeting_network:
    driver: bridge